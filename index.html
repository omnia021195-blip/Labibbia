<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaBibbia - Pozzallo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', monospace; }
        .glow { text-shadow: 0 0 10px #ffcc00; }
        .border-gold { border: 1px solid #ffcc00; }
    </style>
</head>
<body class="p-4 bg-black">
    <div id="welcome" class="fixed inset-0 bg-black flex flex-col justify-center items-center z-50 p-6 text-center">
        <h1 class="text-3xl font-bold text-yellow-500 mb-4 glow">VUOI GIOCARE, POZZALLO?</h1>
        <button onclick="document.getElementById('welcome').style.display='none'" class="bg-yellow-600 text-black font-bold py-3 px-8 rounded-full">ENTRA NEL PECCATO</button>
    </div>

    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-yellow-500">LABIBBIA</h2>
        <div class="flex items-center gap-2"><span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span><span class="text-xs uppercase">Live</span></div>
    </div>

    <div id="feed" class="space-y-4"></div>

    <script>
        // Collegamento al tuo database specifico
        const supabaseUrl = 'https://xwnvpswxmlspzfdtzxmf.supabase.co';
        const supabaseKey = 'sb_publishable_p_Ap7Vfqbsw_rRHr2v1wcw_hmhDkwVK';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function caricaSegreti() {
            const { data, error } = await _supabase.from('segreti').select('*').order('created_at', { ascending: false });
            if (error) { console.log("Errore:", error); return; }
            
            const container = document.getElementById('feed');
            container.innerHTML = data.map(s => `
                <div class="border-gold p-4 rounded-lg bg-zinc-900 shadow-lg mb-4">
                    <div class="text-xs text-yellow-500 mb-2 uppercase">#SEGRETO - ${new Date(s.created_at).toLocaleTimeString()}</div>
                    <p class="text-sm mb-4">${s.Testo}</p>
                    <button onclick="brucia('${s.id}', ${s.fuochi})" class="flex items-center gap-1 text-sm bg-zinc-800 px-3 py-1 rounded-full border border-zinc-700">
                        🔥 <span>${s.fuochi || 0}</span> BRUCIA
                    </button>
                </div>
            `).join('');
        }

        async function brucia(id, current) {
            await _supabase.from('segreti').update({ fuochi: parseInt(current) + 1 }).eq('id', id);
            caricaSegreti();
        }

        caricaSegreti();
    </script>
</body>
</html>
